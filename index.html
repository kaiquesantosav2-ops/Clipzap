const API = {
  signup: (email, password, name) => {
    const users = JSON.parse(localStorage.getItem("clipzap_users") || "{}");
    if (users[email]) return { error: "E-mail já cadastrado" };
    users[email] = { email, password, name, credits: 1000, createdAt: new Date().toISOString() };
    localStorage.setItem("clipzap_users", JSON.stringify(users));
    return { success: true };
  },
  login: (email, password) => {
    const users = JSON.parse(localStorage.getItem("clipzap_users") || "{}");
    if (!users[email] || users[email].password !== password) return { error: "Credenciais inválidas" };
    localStorage.setItem("clipzap_current_user", email);
    return { success: true, user: users[email] };
  },
  logout: () => localStorage.removeItem("clipzap_current_user"),
  getCurrentUser: () => {
    const email = localStorage.getItem("clipzap_current_user");
    if (!email) return null;
    const users = JSON.parse(localStorage.getItem("clipzap_users") || "{}");
    return users[email] || null;
  },
  saveProject: (data) => {
    const email = localStorage.getItem("clipzap_current_user");
    const projects = JSON.parse(localStorage.getItem(`clipzap_projects_${email}`) || "[]");
    const id = Date.now().toString();
    projects.push({ id, ...data, createdAt: new Date().toISOString() });
    localStorage.setItem(`clipzap_projects_${email}`, JSON.stringify(projects));
    return { success: true, projectId: id };
  },
  getProjects: () => {
    const email = localStorage.getItem("clipzap_current_user");
    return JSON.parse(localStorage.getItem(`clipzap_projects_${email}`) || "[]");
  },
  deleteProject: (projectId) => {
    const email = localStorage.getItem("clipzap_current_user");
    const projects = JSON.parse(localStorage.getItem(`clipzap_projects_${email}`) || "[]");
    localStorage.setItem(`clipzap_projects_${email}`, JSON.stringify(projects.filter(p => p.id !== projectId)));
    return { success: true };
  }
};

async function generateSubtitles(videoTitle, language = "pt") {
  try {
    const langMap = { pt: "português", en: "english", es: "español", de: "deutsch", ru: "русский" };
    const prompt = `Gere legendas REALISTAS para um vídeo com título ou URL: "${videoTitle}"

Responda APENAS com JSON válido:
{
  "subtitles": [
    {"start": 0, "end": 3, "text": "primeira linha"},
    {"start": 3, "end": 6, "text": "segunda linha"}
  ]
}

Crie 8-12 legendas em ${langMap[language] || "português"}, naturais e realistas. Duração total: 40-60 segundos. APENAS JSON, nada mais.`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content?.[0]?.text || "";
    const clean = text.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(clean);
    return parsed.subtitles || [];
  } catch (e) {
    console.warn("API não configurada, retornando legendas simuladas.", e);
    // Retorno de fallback caso a API falhe (o que vai acontecer sem a chave da API)
    return [
      { start: 0, end: 4, text: "Bem-vindo a este vídeo incrível!" },
      { start: 4, end: 8, text: "Hoje vamos aprender algo novo." },
      { start: 8, end: 12, text: "Preste muita atenção nos detalhes..." },
      { start: 12, end: 16, text: "E não se esqueça de se inscrever." },
    ];
  }
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  return `${m}:${String(Math.floor(s % 60)).padStart(2, "0")}`;
}

// Extrai ID do YouTube se a URL for do YouTube
function getYouTubeID(url) {
  const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
  const match = url.match(regExp);
  return (match && match[2].length === 11) ? match[2] : null;
}

function downloadProject(projectName, subtitles, language, style) {
  const caption = CAPTIONS.find(c => c.id === style);
  const data = {
    projectName,
    subtitles,
    language,
    captionStyle: caption.name,
    exportedAt: new Date().toISOString(),
    credits: 100
  };
  
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${projectName}-${new Date().getTime()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

      <div style={{ background: "#0A0A14", borderBottom: "1px solid #14141F", padding: "16px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ fontSize: "16px", fontWeight: 700, color: "#ddd" }}>🎬 Studio</div>
        <button onClick={onBack} style={{ padding: "8px 16px", background: "transparent", border: "1px solid #14141F", borderRadius: "10px", color: "#3A3A4A", fontSize: "12px", fontWeight: 700, cursor: "pointer" }}>← Voltar</button>
      </div>

      <div style={{ maxWidth: "1400px", margin: "0 auto", padding: "24px", display: "grid", gridTemplateColumns: "1fr 340px", gap: "20px" }}>
        <div style={{ display: "flex", flexDirection: "column", gap: "20px" }}>
          
          {/* Sessão de Importar URL */}
          <div style={{ background: "#0A0A14", border: "1px solid #14141F", borderRadius: "16px", padding: "16px" }}>
            <p style={{ fontSize: "11px", fontWeight: 700, textTransform: "uppercase", color: "#1A1A28", marginBottom: "12px" }}>🔗 Importar Vídeo</p>
            <div style={{ display: "flex", gap: "10px" }}>
              <input 
                type="text" 
                placeholder="Cole a URL de um .mp4 ou do YouTube..." 
                value={customUrl} 
                onChange={(e) => setCustomUrl(e.target.value)} 
                style={{ flex: 1, background: "#050507", border: "1px solid #14141F", borderRadius: "10px", padding: "12px", color: "#F5F5F8", fontSize: "13px", outline: "none" }} 
              />
              <button 
                onClick={loadCustomUrl} 
                disabled={!customUrl.trim() || loading}
                style={{ padding: "0 20px", background: "linear-gradient(135deg, #FF2D55, #FF6B00)", border: "none", borderRadius: "10px", color: "#fff", fontWeight: 700, cursor: "pointer", opacity: !customUrl.trim() || loading ? 0.5 : 1 }}>
                Carregar
              </button>
            </div>
          </div>

          {/* Videos de Demo */}
          <div style={{ background: "#0A0A14", border: "1px solid #14141F", borderRadius: "16px", padding: "16px" }}>
            <p style={{ fontSize: "11px", fontWeight: 700, textTransform: "uppercase", color: "#1A1A28", marginBottom: "12px" }}>🎯 Vídeos de Demonstração</p>
            <div style={{ display: "flex", overflowX: "auto", gap: "10px", paddingBottom: "8px" }} className="no-scrollbar">
              {videos.map((v) => (
                <div key={v.id} onClick={() => selectVideo(v)} style={{ background: "#050507", border: "1px solid #14141F", borderRadius: "12px", padding: "12px", cursor: "pointer", display: "flex", gap: "12px", alignItems: "center", minWidth: "250px" }}>
                  <div style={{ fontSize: "24px" }}>{v.thumbnail}</div>
                  <div>
                    <div style={{ fontSize: "12px", fontWeight: 700, color: "#ddd", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", width: "180px" }}>{v.title}</div>
                    <div style={{ fontSize: "10px", color: "#1A1A28" }}>{v.channel}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Player de Vídeo */}
          {videoSelected && (
            <div style={{ background: "#0A0A14", border: "1px solid #14141F", borderRadius: "16px", overflow: "hidden" }}>
              <div style={{ background: "linear-gradient(135deg, #1A1A28, #0A0A12)", aspectRatio: "16/9", display: "flex", alignItems: "center", justifyContent: "center", position: "relative", fontSize: "48px", overflow: "hidden" }}>
                
                {/* Renderização condicional do Player Baseado no Tipo */}
                {videoType === "mp4" && (
                  <video 
                    src={activeVideoSrc} 
                    controls 
                    autoPlay
                    onTimeUpdate={(e) => setCurrentTime(e.target.currentTime)}
                    style={{ width: "100%", height: "100%", objectFit: "cover" }} 
                  />
                )}

                {videoType === "youtube" && (
                  <iframe 
                    src={activeVideoSrc} 
                    frameBorder="0" 
                    allow="autoplay; encrypted-media" 
                    allowFullScreen 
                    style={{ width: "100%", height: "100%", position: "absolute", top: 0, left: 0 }}
                  ></iframe>
                )}

                {videoType === "demo" && (
                  <span>📹</span>
                )}

                {/* Camada de Legendas sobre o Vídeo */}
                {currentSub && (
                  <div style={{ position: "absolute", bottom: "10%", left: "50%", transform: "translateX(-50%)", padding: "14px 20px", borderRadius: "10px", fontSize: "18px", fontWeight: 800, maxWidth: "80%", textAlign: "center", whiteSpace: "normal", background: style?.bg, color: style?.text, animation: "slideUp .3s", pointerEvents: "none", zIndex: 10 }}>
                    {currentSub.text}
                  </div>
                )}
              </div>
              
              {/* Controles de Slider (Apenas para Demo ou YouTube, pois MP4 tem seu proprio timeUpdate) */}
              {(videoType === "demo" || videoType === "youtube") && (
                <div style={{ padding: "16px", borderTop: "1px solid #14141F" }}>
                  <input type="range" min="0" max="60" value={currentTime} onChange={(e) => setCurrentTime(Number(e.target.value))} style={{ width: "100%", height: "5px", background: "#14141F", borderRadius: "4px", outline: "none", marginBottom: "10px", cursor: "pointer" }} />
                  <div style={{ display: "flex", gap: "8px", fontSize: "12px", color: "#3A3A4A", justifyContent: "center" }}>
                    <span>{formatTime(currentTime)}</span> / <span>1:00</span>
                    {videoType === "youtube" && <span style={{color: "#FF2D55", marginLeft: "10px"}}>(Use o slider para simular o tempo no YouTube)</span>}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

        {/* Controles Laterais */}
        <div style={{ display: "flex", flexDirection: "column", gap: "16px" }}>
          <div style={{ background: "#0A0A14", border: "1px solid #14141F", borderRadius: "16px", padding: "14px" }}>
            <p style={{ fontSize: "11px", fontWeight: 700, textTransform: "uppercase", color: "#1A1A28", marginBottom: "12px" }}>🌐 Idioma da Legenda</p>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "7px" }}>
              {LANGUAGES.map((l) => (
                <button key={l.code} onClick={() => setSelectedLang(l.code)} style={{ padding: "10px", background: selectedLang === l.code ? "#FF2D5515" : "transparent", border: selectedLang === l.code ? "1px solid #FF2D5540" : "1px solid #14141F", borderRadius: "10px", color: selectedLang === l.code ? "#FF2D55" : "#3A3A4A", fontSize: "10px", fontWeight: 700, cursor: "pointer", textAlign: "center" }}>
                  <div style={{ fontSize: "16px" }}>{l.flag}</div>{l.name.split(" ")[0]}
                </button>
              ))}
            </div>
          </div>

          <div style={{ background: "#0A0A14", border: "1px solid #14141F", borderRadius: "16px", padding: "14px" }}>
            <p style={{ fontSize: "11px", fontWeight: 700, textTransform: "uppercase", color: "#1A1A28", marginBottom: "12px" }}>💬 Estilo</p>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "7px" }}>
              {CAPTIONS.map((c) => (
                <button key={c.id} onClick={() => setCaptionStyle(c.id)} style={{ padding: "10px", background: captionStyle === c.id ? "#FF2D5515" : "transparent", border: captionStyle === c.id ? "1px solid #FF2D5540" : "1px solid #14141F", borderRadius: "10px", color: captionStyle === c.id ? "#FF2D55" : "#3A3A4A", fontSize: "10px", fontWeight: 700, cursor: "pointer" }}>
                  {c.icon} {c.name}
                </button>
              ))}
            </div>
          </div>

          <button onClick={handleDownload} disabled={!videoSelected || loading} style={{ width: "100%", padding: "12px", background: "linear-gradient(135deg, #FF2D55, #FF6B00)", border: "none", borderRadius: "12px", color: "#fff", fontWeight: 800, cursor: "pointer", opacity: !videoSelected || loading ? 0.5 : 1 }}>
            {loading ? "⏳ Gerando..." : "💾 Exportar"}
          </button>

          <div style={{ background: "#0A0A14", border: "1px solid #14141F", borderRadius: "12px", padding: "12px", fontSize: "12px", color: "#aaa", lineHeight: 1.6 }}>
            <div style={{ display: "flex", justifyContent: "space-between", paddingBottom: "6px", borderBottom: "1px solid #14141F" }}>
              <span>📝 Legendas Geradas</span>
              <strong style={{ color: "#FF2D55" }}>{subtitles.length}</strong>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", paddingBottom: "6px", borderBottom: "1px solid #14141F", marginTop: "6px" }}>
              <span>🌐 Idioma</span>
              <strong>{LANGUAGES.find(l => l.code === selectedLang)?.name}</strong>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", paddingTop: "6px", marginTop: "6px" }}>
              <span>⭐ Seus Créditos</span>
              <strong style={{ color: "#FFD700" }}>{user.credits}</strong>
            </div>
          </div>
        </div>
      </div>

      <style>{`
        @keyframes slideUp {
          from { opacity: 0; transform: translateX(-50%) translateY(20px); }
          to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
      `}</style>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════════════

function App() {
  const [user, setUser] = useState(API.getCurrentUser());
  const [project, setProject] = useState(null);

  useEffect(() => {
    const users = JSON.parse(localStorage.getItem("clipzap_users") || "{}");
    if (!users["demo@clipzap.com"]) API.signup("demo@clipzap.com", "123456", "Demo User");
  }, []);

  if (!user) return <LoginPage onSuccess={(u) => setUser(u)} />;
  if (project) return <Studio projectId={project} user={user} onBack={() => setProject(null)} />;
  return <Dashboard user={user} onLogout={() => { API.logout(); setUser(null); }} onOpenProject={(p) => setProject(p)} />;
}

// ═══════════════════════════════════════════════════════════════════════════
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
